name: Fetch and Score Jobs

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libexpat1 libxcb1 libxkbcommon0 \
            libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run job fetcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python scripts/fetch_jobs.py

      - name: Commit updated jobs
        run: |
          git config user.name  "Job Curator Bot"
          git config user.email "bot@job-curator"
          git add docs/jobs.json
          git diff --staged --quiet || git commit -m "Update jobs $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push